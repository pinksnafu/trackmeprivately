name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: Lint and build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./dev.db

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

  docker-smoke-test:
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: trackmeprivately:smoke-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container smoke test
        run: |
          docker run -d \
            --name smoke-test \
            -p 3000:3000 \
            -e NEXTAUTH_SECRET="smoke-test-secret-value-longer-size-for-jwt-key" \
            trackmeprivately:smoke-test
          
          echo "Waiting for container to start..."
          for i in {1..30}; do
            if curl -s -f http://localhost:3000/login > /dev/null; then
              echo "Container is healthy and responding!"
              docker rm -f smoke-test
              exit 0
            fi
            echo "Waiting..."
            sleep 1
          done
          
          echo "Error: Container failed to start or respond on port 3000"
          docker logs smoke-test
          docker rm -f smoke-test
          exit 1
