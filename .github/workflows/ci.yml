name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: Lint and build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./dev.db

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
